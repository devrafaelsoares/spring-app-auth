services:

  postgres:
    image: postgres:16-alpine
    container_name: spring-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: spring_auth_db
      POSTGRES_USER: ${DATABASE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-postgres} -d spring_auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - spring-auth-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spring-auth-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APPLICATION_PORT:-8080}:8080"
    environment:
      APPLICATION_NAME: SpringBootAuth
      DATABASE_HOST: jdbc:postgresql://postgres:5432/spring_auth_db
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      APPLICATION_PORT: 8080
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      SPRING_PROFILES_ACTIVE: dev
    networks:
      - spring-auth-network

volumes:
  postgres_data:
    driver: local

networks:
  spring-auth-network:
    driver: bridge
